<svg width="960" height="620" viewBox="0 0 960 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Perceived risks associated with political expression through art</title>
  <desc id="desc">State surveillance or threats 27, arrest or legal consequences 24, loss of work or commissions 22, being blacklisted 14, backlash from audiences or fans 6, online abuse or trolling 5, none 2.</desc>
  <rect width="960" height="620" rx="36" fill="#FFFFFF"/>
  <text x="56" y="70" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="700" fill="#111111">Perceived risks</text>
  <text x="56" y="100" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="500" fill="#5E5E5E">Number of respondents identifying each risk.</text>

  <g font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="700" fill="#111111">
    <text x="56" y="150">State surveillance / threats</text>
    <rect x="350" y="126" width="500" height="28" rx="14" fill="#F4F1EA"/>
    <rect x="350" y="126" width="500" height="28" rx="14" fill="#EE4136"/>
    <text x="914" y="148" text-anchor="end">27</text>

    <text x="56" y="206">Arrest / legal consequences</text>
    <rect x="350" y="182" width="500" height="28" rx="14" fill="#F4F1EA"/>
    <rect x="350" y="182" width="444" height="28" rx="14" fill="#F98D29"/>
    <text x="914" y="204" text-anchor="end">24</text>

    <text x="56" y="262">Loss of work / commissions</text>
    <rect x="350" y="238" width="500" height="28" rx="14" fill="#F4F1EA"/>
    <rect x="350" y="238" width="407" height="28" rx="14" fill="#99B72C"/>
    <text x="914" y="260" text-anchor="end">22</text>

    <text x="56" y="318">Being blacklisted</text>
    <rect x="350" y="294" width="500" height="28" rx="14" fill="#F4F1EA"/>
    <rect x="350" y="294" width="259" height="28" rx="14" fill="#111111"/>
    <text x="914" y="316" text-anchor="end">14</text>

    <text x="56" y="374">Backlash from audiences / fans</text>
    <rect x="350" y="350" width="500" height="28" rx="14" fill="#F4F1EA"/>
    <rect x="350" y="350" width="111" height="28" rx="14" fill="#F98D29"/>
    <text x="914" y="372" text-anchor="end">6</text>

    <text x="56" y="430">Online abuse / trolling</text>
    <rect x="350" y="406" width="500" height="28" rx="14" fill="#F4F1EA"/>
    <rect x="350" y="406" width="93" height="28" rx="14" fill="#EE4136"/>
    <text x="914" y="428" text-anchor="end">5</text>

    <text x="56" y="486">None</text>
    <rect x="350" y="462" width="500" height="28" rx="14" fill="#F4F1EA"/>
    <rect x="350" y="462" width="37" height="28" rx="14" fill="#99B72C"/>
    <text x="914" y="484" text-anchor="end">2</text>
  </g>
</svg>
